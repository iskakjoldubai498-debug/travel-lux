{% extends 'tours/base.html' %}

{% block content %}
<style>
    .info-card { background: white; border-radius: 24px; border: 1px solid #f1f5f9; }
    .dark .info-card { background: #1e293b; border-color: rgba(255,255,255,0.05); }
    .gold-gradient { background: linear-gradient(135deg, #D4AF37 0%, #FFD700 100%); }
</style>

<section class="pt-32 pb-20 dark:bg-[#0f172a] transition-colors duration-500">
    <div class="container mx-auto px-6">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-16">

            <div class="relative h-[400px] md:h-[600px] rounded-[3rem] overflow-hidden shadow-2xl">
                <img src="{{ tour.image.url }}" class="w-full h-full object-cover">
                <div class="absolute top-8 left-8 bg-black/50 backdrop-blur-lg px-6 py-2 rounded-full">
                    <span class="text-white text-xs font-black uppercase tracking-widest" data-i18n="detail-tag">Кыргызстан</span>
                </div>
            </div>

            <div class="flex flex-col justify-center">
                <h1 class="text-4xl md:text-6xl font-black mb-6 uppercase italic tracking-tighter dark:text-white leading-none">
                    {{ tour.title }}
                </h1>

                <div class="grid grid-cols-2 gap-4 mb-10">
                    <div class="info-card p-6">
                        <span class="text-[10px] uppercase font-bold text-gray-400 block mb-1" data-i18n="search-when">Качан?</span>
                        <span class="font-black dark:text-white">{{ tour.duration }}</span>
                    </div>
                    <div class="info-card p-6">
                        <span class="text-[10px] uppercase font-bold text-gray-400 block mb-1" data-i18n="tours-title">Баасы</span>
                        <span class="font-black text-[#D4AF37] text-xl">${{ tour.price }}</span>
                    </div>
                </div>

                <div class="prose dark:prose-invert max-w-none mb-12">
                    <p class="text-gray-500 dark:text-gray-400 text-lg leading-relaxed italic">
                        {{ tour.description }}
                    </p>
                </div>

                <a href="https://wa.me/996553956070" class="gold-gradient w-full py-6 rounded-3xl text-center text-black font-black uppercase tracking-[0.2em] text-xs shadow-xl hover:scale-[1.02] transition-transform">
                    <span data-i18n="btn-book-now">Брондоо</span>
                </a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
