{% extends 'tours/base.html' %}

{% block content %}
<style>
    /* "App Icon" стилиндеги баскычтар */
    .app-icon {
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        aspect-ratio: 1 / 1; /* Квадрат формасы */
        border-radius: 1.5rem; /* Бурчтары жумшак */
        width: 100%;
        max-width: 120px; /* Телефондо өтө чоң болуп кетпеши үчүн */
        margin: 0 auto;
    }
    
    /* Телефондо басканда реакция бериши үчүн */
    .app-icon:active {
        transform: scale(0.9);
    }

    .bg-phone { background: #007AFF; }
    .bg-whatsapp { background: #25D366; }
    .bg-instagram { background: linear-gradient(45deg, #f09433 0%, #dc2743 50%, #bc1888 100%); }

    /* КАРТА: Ар дайым ак режимде */
    .map-frame {
        filter: none !important;
        background: white;
    }
</style>

<section class="pt-32 pb-20 dark:bg-[#0f172a] transition-colors duration-500">
    <div class="container mx-auto px-6 max-w-4xl">

        <div class="text-center mb-12">
            <h1 class="text-3xl md:text-6xl font-black text-gray-900 dark:text-white uppercase italic tracking-tighter" data-i18n="contact-title">
                Бизге байланышыңыз
            </h1>
            <div class="w-12 h-1 bg-[#D4AF37] mx-auto mt-4"></div>
        </div>

        <div class="grid grid-cols-3 gap-4 md:gap-8 mb-16 max-w-sm md:max-w-xl mx-auto">

            <a href="tel:+996553956070" class="app-icon bg-phone text-white shadow-lg">
                <i class="fas fa-phone text-2xl md:text-4xl"></i>
                <span class="text-[8px] md:text-[10px] uppercase font-black mt-2 tracking-tighter" data-i18n="contact-call">Call</span>
            </a>

            <a href="https://wa.me/996553956070" class="app-icon bg-whatsapp text-white shadow-lg">
                <i class="fab fa-whatsapp text-3xl md:text-5xl"></i>
                <span class="text-[8px] md:text-[10px] uppercase font-black mt-2 tracking-tighter">WhatsApp</span>
            </a>

            <a href="https://instagram.com/i_235_k" target="_blank" class="app-icon bg-instagram text-white shadow-lg">
                <i class="fab fa-instagram text-3xl md:text-5xl"></i>
                <span class="text-[8px] md:text-[10px] uppercase font-black mt-2 tracking-tighter">Instagram</span>
            </a>

        </div>

        <div class="map-frame rounded-[2rem] overflow-hidden shadow-xl h-[300px] md:h-[450px] border-4 border-white dark:border-slate-800">
            <iframe
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d192739.0526017772!2d72.71536643265535!3d40.540485603774845!2m3!1f0!2f0!3f0!3m2!1i1024!2i1024!4h4.1!3m3!1m2!1s0x38bdad04d13f9977%3A0x62804368936f455c!2sOsh!5e0!3m2!1sen!2skg!4v1710000000000!5m2!1sen!2skg"
                width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy">
            </iframe>
        </div>

    </div>
</section>
{% endblock %}
