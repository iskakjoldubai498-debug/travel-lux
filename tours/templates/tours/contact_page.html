{% extends 'tours/base.html' %}

{% block content %}
<style>
    /* Баскычтарды кичирейтүү */
    .contact-link {
        transition: all 0.3s ease;
        color: white !important;
        width: 100%;
        max-width: 180px; /* Баскычтын туурасын чектөө */
        margin: 0 auto;
    }

    .phone-btn { background: #2563eb; }
    .wa-btn { background: #25D366; }
    .ig-btn { background: linear-gradient(45deg, #f09433 0%, #dc2743 50%, #bc1888 100%); }

    .contact-link:hover {
        transform: translateY(-5px);
        filter: brightness(1.1);
        box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }

    /* Карта ар дайым ачык */
    .map-box {
        filter: none !important;
        background: white;
    }
</style>

<section class="pt-40 pb-20 dark:bg-[#0a0a0a] transition-colors duration-500">
    <div class="container mx-auto px-6 max-w-4xl">

        <h1 class="text-2xl md:text-4xl font-black uppercase tracking-tighter text-center mb-12 dark:text-white italic">
            Бизге байланышыңыз
        </h1>

        <div class="grid grid-cols-3 gap-3 md:gap-6 mb-16">

            <a href="tel:+996553956070" class="contact-link phone-btn py-6 md:py-8 rounded-3xl text-center">
                <i class="fas fa-phone text-xl md:text-2xl"></i>
                <span class="text-[9px] uppercase font-bold tracking-widest mt-2 block">Телефон</span>
            </a>

            <a href="https://wa.me/996553956070" class="contact-link wa-btn py-6 md:py-8 rounded-3xl text-center">
                <i class="fab fa-whatsapp text-2xl md:text-3xl"></i>
                <span class="text-[9px] uppercase font-bold tracking-widest mt-2 block">WhatsApp</span>
            </a>

            <a href="https://instagram.com/i_235_k" target="_blank" class="contact-link ig-btn py-6 md:py-8 rounded-3xl text-center">
                <i class="fab fa-instagram text-2xl md:text-3xl"></i>
                <span class="text-[9px] uppercase font-bold tracking-widest mt-2 block">Instagram</span>
            </a>

        </div>

        <div class="map-box rounded-[2rem] overflow-hidden shadow-lg h-[350px] border border-gray-100">
            <iframe
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d187126.31551065983!2d74.43711904555845!3d42.87596853609828!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x389eb7dc91b36981%3A0x94616930541e250d!2z0JHQuNGI0LrQtdC6!5e0!3m2!1sru!2skg!4v1710515000000!5m2!1sru!2skg"
                width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy">
            </iframe>
        </div>

    </div>
</section>

{% endblock %}
