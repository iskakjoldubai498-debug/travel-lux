<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Travel Lux | Premium Kyrgyzstan</title>

    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            if (savedTheme === 'dark') {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>

    <style>
        body { font-family: 'Montserrat', sans-serif; -webkit-tap-highlight-color: transparent; scroll-behavior: smooth; transition: background-color 0.3s ease; }
        .glass { background: rgba(241, 245, 249, 0.9); backdrop-filter: blur(10px); }
        .dark .glass { background: rgba(30, 41, 59, 0.9); border-bottom: 1px solid rgba(255,255,255,0.05); }

        #lang-dropdown { transition: all 0.2s ease-out; opacity: 0; transform: scale(0.95); pointer-events: none; }
        #lang-dropdown.active { opacity: 1; transform: scale(1); pointer-events: auto; }

        #mobile-menu {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(15px);
            background: rgba(241, 245, 249, 0.85);
            height: auto;
            max-height: 0;
            overflow: hidden;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .dark #mobile-menu { background: rgba(15, 23, 42, 0.9); }
        #mobile-menu.active { max-height: 300px; padding-bottom: 20px; border-bottom: 1px solid rgba(0,0,0,0.05); }

        .mobile-link {
            font-size: 0.9rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.15em; padding: 14px 25px; display: block; transition: all 0.2s ease;
        }

        /* --- LUXURY NOISE --- */
        .noise-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9999; pointer-events: none; opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }
        img { filter: contrast(1.05) brightness(0.95); transition: all 0.8s cubic-bezier(0.2, 1, 0.3, 1); }
    </style>
</head>
<body class="bg-[#fcfcfc] dark:bg-[#0f172a] text-[#111] dark:text-white overflow-x-hidden">

    <div class="noise-bg"></div>

    <nav class="glass fixed w-full z-[100] border-b border-black/5 shadow-sm">
        <div class="container mx-auto px-4 md:px-10 py-2 flex justify-between items-center">
            <a href="{% url 'home' %}" class="text-base md:text-lg font-black tracking-[0.2em] uppercase">
                Travel<span class="text-yellow-600">Lux</span>
            </a>

            <div class="hidden md:flex space-x-8 text-[9px] font-bold uppercase tracking-[0.2em] text-gray-500">
                <a href="{% url 'home' %}" class="hover:text-black dark:hover:text-white transition" data-i18n="nav-home">Home</a>
                <a href="{% url 'tours_list' %}" class="hover:text-black dark:hover:text-white transition" data-i18n="nav-tours">Tours</a>
                <a href="{% url 'details_page' %}" class="hover:text-black dark:hover:text-white transition" data-i18n="nav-details">Details</a>
                <a href="{% url 'contact_page' %}" class="hover:text-black dark:hover:text-white transition" data-i18n="nav-contact">Contact</a>
            </div>

            <div class="flex items-center gap-3 md:gap-6">
                <button id="theme-toggle" class="text-base hover:text-yellow-600 transition p-2">
                    <i class="fas fa-moon dark:hidden"></i>
                    <i class="fas fa-sun hidden dark:block text-yellow-500"></i>
                </button>

                <div class="relative">
                    <button id="lang-btn" class="flex items-center gap-1 text-[9px] font-black uppercase tracking-widest border-b border-black dark:border-white pb-0.5">
                        <span id="current-lang">EN</span>
                    </button>
                    <div id="lang-dropdown" class="absolute right-0 mt-3 w-28 glass border border-black/5 dark:border-white/10 rounded-lg py-1 shadow-xl">
                        <button onclick="changeLang('kg')" class="w-full text-left px-3 py-2 text-[9px] font-bold hover:bg-yellow-600 hover:text-white transition">KG</button>
                        <button onclick="changeLang('ru')" class="w-full text-left px-3 py-2 text-[9px] font-bold hover:bg-yellow-600 hover:text-white transition">RU</button>
                        <button onclick="changeLang('en')" class="w-full text-left px-3 py-2 text-[9px] font-bold hover:bg-yellow-600 hover:text-white transition">EN</button>
                    </div>
                </div>

                <button id="mobile-menu-btn" class="md:hidden text-lg p-2">
                    <i class="fas fa-bars-staggered"></i>
                </button>
            </div>
        </div>

        <div id="mobile-menu" class="w-full md:hidden">
            <div class="flex flex-col pt-4">
                <a href="{% url 'home' %}" class="mobile-link text-slate-700 dark:text-slate-200" data-i18n="nav-home">Home</a>
                <a href="{% url 'tours_list' %}" class="mobile-link text-slate-700 dark:text-slate-200" data-i18n="nav-tours">Tours</a>
                <a href="{% url 'details_page' %}" class="mobile-link text-slate-700 dark:text-slate-200" data-i18n="nav-details">Details</a>
                <a href="{% url 'contact_page' %}" class="mobile-link text-slate-700 dark:text-slate-200" data-i18n="nav-contact">Contact</a>
            </div>
        </div>
    </nav>

    <main class="pt-16">
        {% block content %}{% endblock %}
    </main>

    <script>
        const translations = {
            'kg': {
                'nav-home': 'Башкы бет', 'nav-tours': 'Турлар', 'nav-details': 'Биз жөнүндө', 'nav-contact': 'Байланыш',
                'hero-subtitle': 'Кыргызстандын сыйкырдуу дүйнөсү сизди күтөт', 'search-where': 'Каякка?', 'search-when': 'Качан?', 'search-btn': 'Издөө',
                'tours-title': 'Сунушталган', 'tours-highlight': 'турлар', 'btn-details': 'Кененирээк', 'btn-book': 'Брондоо',
                'no-tours': 'Кечиресиз, тур табылган жок', 'no-tours-desc': 'Сиз издеген параметрлер боюнча азырынча турлар жок.',
                'about-tag': 'Биздин философия', 'about-title-1': 'Эмне үчүн', 'about-title-2': 'Бизди Тандашат?',
                'about-exp': 'Жылдык тажрыйба', 'about-h1': 'Кол тийбеген табият', 'about-p1': '"Биз сизди жөн гана жерлерге эмес, Кыргызстандын жанына алып барабыз."',
                'about-h2': 'Эксклюзивдүү Comfort', 'about-p2': '"Lux тейлөө — бул биз үчүн стандарт."', 'about-h3': 'Жеке мамиле',
                'about-p3': '"Ар бир конок — биздин досубуз."', 'about-quote': '"Саякат — бул сени байыта турган жалгыз нерсе."',
                'all-tours': 'Бардыгы', 'no-tours-cat': 'Бул категорияда азырынча турлар жок.', 'back-to-tours': 'Бардык турларга кайтуу',
                'detail-tag': 'Кыргызстан боюнча экспедиция', 'detail-photos': 'Саякаттан сүрөттөр', 'detail-helper': 'Оператор 5 мүнөттө жооп берет.',
                'btn-book-now': 'Брондоо', 'inc-1': 'Премиум унаа', 'cta-title': 'Суроолоруңуз барбы?',
                'cta-desc': 'Биздин менеджерлер сизге жардам берүүгө даяр.', 'contact-title': 'Бизге байланышыңыз',
                'contact-call': 'Чалуу', 'contact-address-tag': 'Дарегибиз', 'contact-city': 'Ош шаары, Кыргызстан',
                'contact-work-tag': 'Иштөө убактысы', 'contact-phone': 'Телефон'
            },
            'ru': {
                'nav-home': 'Главная', 'nav-tours': 'Туры', 'nav-details': 'О нас', 'nav-contact': 'Контакты',
                'hero-subtitle': 'Магический мир Кыргызстана ждет вас', 'search-where': 'Куда?', 'search-when': 'Когда?', 'search-btn': 'Поиск',
                'tours-title': 'Рекомендуемые', 'tours-highlight': 'туры', 'btn-details': 'Подробнее', 'btn-book': 'Бронировать',
                'no-tours': 'Извините, туры не найдены', 'about-tag': 'Наша философия', 'about-title-1': 'Почему', 'about-title-2': 'Выбирают нас?',
                'about-h1': 'Первозданная природа', 'about-h2': 'Эксклюзивный комфорт', 'about-h3': 'Личный подход',
                'about-quote': '"Путешествие делает вас богаче."', 'all-tours': 'Все', 'no-tours-cat': 'В этой категории пока нет туров.',
                'back-to-tours': 'Вернуться ко всем турам', 'btn-book-now': 'Забронировать', 'cta-title': 'Есть вопросы?',
                'contact-title': 'Свяжитесь с нами', 'contact-call': 'Позвонить', 'contact-city': 'г. Ош, Кыргызстан'
            },
            'en': {
                'nav-home': 'Home', 'nav-tours': 'Tours', 'nav-details': 'About', 'nav-contact': 'Contact',
                'hero-subtitle': 'The magical world of Kyrgyzstan awaits you', 'search-where': 'Where?', 'search-when': 'When?', 'search-btn': 'Search',
                'tours-title': 'Featured', 'tours-highlight': 'tours', 'btn-details': 'Details', 'btn-book': 'Book',
                'no-tours': 'Sorry, no tours found', 'about-tag': 'Our Philosophy', 'about-title-1': 'Why', 'about-title-2': 'Choose Us?',
                'about-h1': 'Untouched Nature', 'about-h2': 'Exclusive Comfort', 'about-h3': 'Personal Approach',
                'about-quote': '"Travel makes you richer."', 'all-tours': 'All', 'no-tours-cat': 'No tours in this category.',
                'back-to-tours': 'Back to all tours', 'btn-book-now': 'Book Now', 'cta-title': 'Have questions?',
                'contact-title': 'Contact Us', 'contact-call': 'Call', 'contact-city': 'Osh city, Kyrgyzstan'
            }
        };


        function changeLang(lang) {
            const currentLangEl = document.getElementById('current-lang');
            if (currentLangEl) currentLangEl.innerText = lang.toUpperCase();
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang] && translations[lang][key]) el.innerText = translations[lang][key];
            });
            localStorage.setItem('lang', lang);
        }

        document.getElementById('theme-toggle').onclick = () => {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        };

        const langBtn = document.getElementById('lang-btn');
        const langDropdown = document.getElementById('lang-dropdown');
        langBtn.onclick = (e) => { e.stopPropagation(); langDropdown.classList.toggle('active'); };
        window.onclick = () => { if (langDropdown) langDropdown.classList.remove('active'); };

        const mobileMenu = document.getElementById('mobile-menu');
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        mobileMenuBtn.onclick = () => {
            const isActive = mobileMenu.classList.toggle('active');
            mobileMenuBtn.querySelector('i').classList.replace(isActive ? 'fa-bars-staggered' : 'fa-xmark', isActive ? 'fa-xmark' : 'fa-bars-staggered');
        };

        window.onload = () => {
            const savedLang = localStorage.getItem('lang') || 'kg';
            changeLang(savedLang);
        };
    </script>
</body>
</html>
