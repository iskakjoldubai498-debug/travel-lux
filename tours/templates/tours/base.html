<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Travel Lux | Premium Kyrgyzstan</title>

    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            if (savedTheme === 'dark') {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <style>
        body { font-family: 'Montserrat', sans-serif; -webkit-tap-highlight-color: transparent; scroll-behavior: smooth; transition: background-color 0.3s ease; }
        .glass { background: rgba(241, 245, 249, 0.9); backdrop-filter: blur(10px); }
        .dark .glass { background: rgba(30, 41, 59, 0.9); border-bottom: 1px solid rgba(255,255,255,0.05); }

        #lang-dropdown { transition: all 0.2s ease-out; opacity: 0; transform: scale(0.95); pointer-events: none; }
        #lang-dropdown.active { opacity: 1; transform: scale(1); pointer-events: auto; }

        /* Жаңы назик мобилдик меню стили */
        #mobile-menu {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(15px); /* Айнек эффекти */
            background: rgba(241, 245, 249, 0.85); /* Тунук боз */
            height: auto;
            max-height: 0; /* Башында жабык */
            overflow: hidden;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .dark #mobile-menu {
            background: rgba(15, 23, 42, 0.9);
        }
        #mobile-menu.active {
            max-height: 300px; /* Экрандын болжол менен 20% бөлүгү */
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .mobile-link {
            font-size: 0.9rem; /* Текст назик жана кичине */
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            padding: 14px 25px;
            display: block;
            transition: all 0.2s ease;
        }
    </style>
</head>
<body class="bg-[#fcfcfc] dark:bg-[#0f172a] text-[#111] dark:text-white overflow-x-hidden">

    <nav class="glass fixed w-full z-[100] border-b border-black/5 shadow-sm">
        <div class="container mx-auto px-4 md:px-10 py-2 flex justify-between items-center">
            <a href="{% url 'home' %}" class="text-base md:text-lg font-black tracking-[0.2em] uppercase">
                Travel<span class="text-yellow-600">Lux</span>
            </a>

            <div class="hidden md:flex space-x-8 text-[9px] font-bold uppercase tracking-[0.2em] text-gray-500">
                <a href="{% url 'home' %}" class="hover:text-black dark:hover:text-white transition" data-i18n="nav-home">Home</a>
                <a href="{% url 'tours_list' %}" class="hover:text-black dark:hover:text-white transition" data-i18n="nav-tours">Tours</a>
                <a href="{% url 'details_page' %}" class="hover:text-black dark:hover:text-white transition" data-i18n="nav-details">Details</a>
                <a href="{% url 'contact_page' %}" class="hover:text-black dark:hover:text-white transition" data-i18n="nav-contact">Contact</a>
            </div>

            <div class="flex items-center gap-3 md:gap-6">
                <button id="theme-toggle" class="text-base hover:text-yellow-600 transition p-2">
                    <i class="fas fa-moon dark:hidden"></i>
                    <i class="fas fa-sun hidden dark:block text-yellow-500"></i>
                </button>

                <div class="relative">
                    <button id="lang-btn" class="flex items-center gap-1 text-[9px] font-black uppercase tracking-widest border-b border-black dark:border-white pb-0.5">
                        <span id="current-lang">EN</span>
                    </button>
                    <div id="lang-dropdown" class="absolute right-0 mt-3 w-28 glass border border-black/5 dark:border-white/10 rounded-lg py-1 shadow-xl">
                        <button onclick="changeLang('kg')" class="w-full text-left px-3 py-2 text-[9px] font-bold hover:bg-yellow-600 hover:text-white transition">KG</button>
                        <button onclick="changeLang('ru')" class="w-full text-left px-3 py-2 text-[9px] font-bold hover:bg-yellow-600 hover:text-white transition">RU</button>
                        <button onclick="changeLang('en')" class="w-full text-left px-3 py-2 text-[9px] font-bold hover:bg-yellow-600 hover:text-white transition">EN</button>
                    </div>
                </div>

                <button id="mobile-menu-btn" class="md:hidden text-lg p-2 focus:outline-none">
                    <i class="fas fa-bars-staggered transition-all duration-300"></i>
                </button>
            </div>
        </div>

        <div id="mobile-menu" class="w-full md:hidden">
            <div class="flex flex-col pt-4">
                <a href="{% url 'home' %}" class="mobile-link text-slate-700 dark:text-slate-200" data-i18n="nav-home">Home</a>
                <a href="{% url 'tours_list' %}" class="mobile-link text-slate-700 dark:text-slate-200" data-i18n="nav-tours">Tours</a>
                <a href="{% url 'details_page' %}" class="mobile-link text-slate-700 dark:text-slate-200" data-i18n="nav-details">Details</a>
                <a href="{% url 'contact_page' %}" class="mobile-link text-slate-700 dark:text-slate-200" data-i18n="nav-contact">Contact</a>
            </div>
        </div>
    </nav>

    <main class="pt-16">
        {% block content %}{% endblock %}
    </main>

        function changeLang(lang) {
            const currentLangEl = document.getElementById('current-lang');
            if (currentLangEl) currentLangEl.innerText = lang.toUpperCase();

            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang] && translations[lang][key]) {
                    el.innerText = translations[lang][key];
                }
            });
            localStorage.setItem('lang', lang);
        }

        const themeToggle = document.getElementById('theme-toggle');
        if (themeToggle) {
            themeToggle.onclick = () => {
                const isDark = document.documentElement.classList.toggle('dark');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
            };
        }

        const langBtn = document.getElementById('lang-btn');
        const langDropdown = document.getElementById('lang-dropdown');
        if (langBtn && langDropdown) {
            langBtn.onclick = (e) => {
                e.stopPropagation();
                langDropdown.classList.toggle('active');
            };
        }

        window.onclick = () => {
            if (langDropdown) langDropdown.classList.remove('active');
        };

        // Мобилдик меню башкаруу
        const mobileMenu = document.getElementById('mobile-menu');
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');

        function toggleMenu() {
            if (mobileMenu) {
                const isActive = mobileMenu.classList.toggle('active');
                const icon = mobileMenuBtn.querySelector('i');
                if (isActive) {
                    icon.classList.replace('fa-bars-staggered', 'fa-xmark');
                } else {
                    icon.classList.replace('fa-xmark', 'fa-bars-staggered');
                }
            }
        }

        if (mobileMenuBtn) mobileMenuBtn.onclick = toggleMenu;

        document.querySelectorAll('.mobile-link').forEach(link => {
            link.onclick = () => {
                mobileMenu.classList.remove('active');
                mobileMenuBtn.querySelector('i').classList.replace('fa-xmark', 'fa-bars-staggered');
            };
        });

        window.onload = () => {
            const savedLang = localStorage.getItem('lang') || 'kg';
            const savedTheme = localStorage.getItem('theme') || 'light';
            changeLang(savedLang);
            if (savedTheme === 'dark') document.documentElement.classList.add('dark');
        };
    </script>

</html>
