<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Travel Lux | Premium Kyrgyzstan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
    <style>
        body { font-family: 'Montserrat', sans-serif; -webkit-tap-highlight-color: transparent; scroll-behavior: smooth; }

        /* Боз фон (меню үчүн) */
        .glass { background: #f1f5f9; } /* Light mode боз фон */
        .dark .glass { background: #1e293b; border-bottom: 1px solid rgba(255,255,255,0.05); } /* Dark mode боз фон */

        /* Тил менюсунун анимациясы */
        #lang-dropdown { transform-origin: top right; transition: all 0.2s ease-out; opacity: 0; transform: scale(0.95); pointer-events: none; }
        #lang-dropdown.active { opacity: 1; transform: scale(1); pointer-events: auto; }

        /* Мобилдик менюнун стили */
        #mobile-menu { background: #f1f5f9; }
        .dark #mobile-menu { background: #1e293b; }
    </style>
</head>
<body class="bg-[#fcfcfc] dark:bg-[#0f172a] text-[#111] dark:text-white overflow-x-hidden">

    <nav class="glass fixed w-full z-[100] border-b border-black/5 shadow-sm">
        <div class="container mx-auto px-4 md:px-10 py-2 flex justify-between items-center">

            <a href="{% url 'home' %}" class="text-base md:text-lg font-black tracking-[0.2em] uppercase">
                Travel<span class="text-yellow-600">Lux</span>
            </a>

            <div class="hidden md:flex space-x-8 text-[9px] font-bold uppercase tracking-[0.2em] text-gray-500">
                <a href="{% url 'home' %}" class="hover:text-black dark:hover:text-white transition" data-i18n="nav-home">Home</a>
                <a href="{% url 'tours_list' %}" class="hover:text-black dark:hover:text-white transition" data-i18n="nav-tours">Tours</a>
                <a href="{% url 'details_page' %}" class="hover:text-black dark:hover:text-white transition" data-i18n="nav-details">Details</a>
                <a href="{% url 'contact_page' %}" class="hover:text-black dark:hover:text-white transition" data-i18n="nav-contact">Contact</a>
            </div>

            <div class="flex items-center gap-3 md:gap-6">
                <button id="theme-toggle" class="text-base hover:text-yellow-600 transition p-2">
                    <i class="fas fa-moon dark:hidden"></i>
                    <i class="fas fa-sun hidden dark:block text-yellow-500"></i>
                </button>

                <div class="relative">
                    <button id="lang-btn" class="flex items-center gap-1 text-[9px] font-black uppercase tracking-widest border-b border-black dark:border-white pb-0.5">
                        <span id="current-lang">EN</span>
                    </button>

                    <div id="lang-dropdown" class="absolute right-0 mt-3 w-28 glass border border-black/5 dark:border-white/10 rounded-lg py-1 shadow-xl">
                        <button onclick="changeLang('kg')" class="w-full text-left px-3 py-2 text-[9px] font-bold hover:bg-yellow-600 hover:text-white transition">KG</button>
                        <button onclick="changeLang('ru')" class="w-full text-left px-3 py-2 text-[9px] font-bold hover:bg-yellow-600 hover:text-white transition">RU</button>
                        <button onclick="changeLang('en')" class="w-full text-left px-3 py-2 text-[9px] font-bold hover:bg-yellow-600 hover:text-white transition">EN</button>
                    </div>
                </div>

                <button id="mobile-menu-btn" class="md:hidden text-lg p-2">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
        </div>
    </nav>

    <div id="mobile-menu" class="fixed inset-0 z-[150] flex flex-col items-center justify-center space-y-8 transition-transform duration-500 translate-x-full">
        <button id="close-menu" class="absolute top-5 right-5 text-3xl text-gray-400">&times;</button>

        <a href="{% url 'home' %}" onclick="toggleMenu()" data-i18n="nav-home" class="text-xl font-bold uppercase tracking-widest">Home</a>
        <a href="{% url 'tours_list' %}" onclick="toggleMenu()" data-i18n="nav-tours" class="text-xl font-bold uppercase tracking-widest">Tours</a>
        <a href="{% url 'details_page' %}" onclick="toggleMenu()" data-i18n="nav-details" class="text-xl font-bold uppercase tracking-widest">Details</a>
        <a href="{% url 'contact_page' %}" onclick="toggleMenu()" data-i18n="nav-contact" class="text-xl font-bold uppercase tracking-widest">Contact</a>

        <div class="flex gap-6 pt-8 border-t border-gray-300 dark:border-white/10 w-1/2 justify-center">
            <button onclick="changeLang('kg'); toggleMenu()" class="text-[10px] font-black">KG</button>
            <button onclick="changeLang('ru'); toggleMenu()" class="text-[10px] font-black">RU</button>
            <button onclick="changeLang('en'); toggleMenu()" class="text-[10px] font-black">EN</button>
        </div>
    </div>

    <main class="pt-16"> {% block content %}{% endblock %}
    </main>

     <script>
        const translations = {
            'kg': { 'nav-home': 'Башкы бет', 'nav-tours': 'Турлар', 'nav-details': 'Кененирээк', 'nav-contact': 'Байланыш' },
            'ru': { 'nav-home': 'Главная', 'nav-tours': 'Туры', 'nav-details': 'Подробнее', 'nav-contact': 'Контакты' },
            'en': { 'nav-home': 'Home', 'nav-tours': 'Tours', 'nav-details': 'Details', 'nav-contact': 'Contact' }
        };

        const langBtn = document.getElementById('lang-btn');
        const langDropdown = document.getElementById('lang-dropdown');

        langBtn.onclick = (e) => {
            e.stopPropagation();
            langDropdown.classList.toggle('active');
        };

        window.onclick = () => langDropdown.classList.remove('active');

        const themeToggle = document.getElementById('theme-toggle');
        themeToggle.onclick = () => {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        };

        const mobileMenu = document.getElementById('mobile-menu');
        function toggleMenu() {
            mobileMenu.classList.toggle('translate-x-full');
            document.body.classList.toggle('overflow-hidden');
        }
        document.getElementById('mobile-menu-btn').onclick = toggleMenu;
        document.getElementById('close-menu').onclick = toggleMenu;

        function changeLang(lang) {
            document.getElementById('current-lang').innerText = lang.toUpperCase();
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang][key]) el.innerText = translations[lang][key];
            });
            localStorage.setItem('lang', lang);
        }

        window.onload = () => {
            changeLang(localStorage.getItem('lang') || 'en');
            if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');
        };
    </script>
</body>
</html>
